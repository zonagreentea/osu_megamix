<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>MEGAMIX CORE // TRUE MERGE</title>
<style>
body{margin:0;background:#05050a;color:#fff;font-family:monospace;overflow:hidden}
.note{position:absolute;font-size:28px;transform:translateX(-50%)}
#hud{position:fixed;top:10px;left:10px}
#hitbar{position:fixed;bottom:120px;width:100%;height:4px;background:#333}
.perfect{color:#00ff99}.good{color:#ffd400}.bad{color:#ff3355}
.layer{opacity:0.8}
</style>
</head>
<body>

<div id="hud">
score: <span id="score">0</span> |
combo: <span id="combo">0</span> |
hp: <span id="hp">100</span> |
truth: <span id="truth">4-LAYER</span>
<div id="msg"></div>
</div>

<div id="hitbar"></div>

<script>
// ================= CORE =================
const lanes=4;
const laneW=window.innerWidth/lanes;
const hitY=window.innerHeight-120;

let score=0, combo=0, hp=100;

const notes=[];
const emojis=["🟣","🔴","🟡","🟢"];

// ================= NOTE =================
function spawn(){
  const lane=Math.random()*4|0;

  const el=document.createElement("div");
  el.className="note layer";
  el.textContent=emojis[lane];

  el.style.left=(lane*laneW+laneW/2)+"px";
  el.style.top="-40px";

  document.body.appendChild(el);

  notes.push({
    el,
    lane,
    y:-40,
    hit:false,
    time:performance.now()
  });
}

// ================= LAYERS =================

// OSU: timing precision
function layer_osu(dist){
  if(dist<10) return 300;
  if(dist<25) return 120;
  return 0;
}

// TAIKO: binary impact
function layer_taiko(dist){
  return dist<35 ? 180 : 0;
}

// MANIA: lane pressure
function layer_mania(lane){
  return lane>=0 ? 80 : 0;
}

// CATCH: positional forgiveness
function layer_catch(dist){
  return dist<50 ? 100 : 0;
}

// ================= FEEDBACK =================
function flash(t){
  const m=document.getElementById("msg");
  m.className=t;
  m.textContent=t;
  setTimeout(()=>m.textContent="",120);
}

function update(){
  document.getElementById("score").textContent=score;
  document.getElementById("combo").textContent=combo;
  document.getElementById("hp").textContent=hp;
}

// ================= HIT ENGINE =================
function hit(lane){
  let best=null,bd=999;

  notes.forEach(n=>{
    if(n.hit||n.lane!==lane) return;
    const d=Math.abs(n.y-hitY);
    if(d<bd){bd=d;best=n;}
  });

  if(!best){
    combo=0;
    hp-=8;
    flash("MISS");
    update();
    return;
  }

  best.hit=true;
  best.el.remove();

  // ===== TRUE MULTI-LAYER SCORING =====
  const osu   = layer_osu(bd);
  const taiko = layer_taiko(bd);
  const mania = layer_mania(lane);
  const catchL= layer_catch(bd);

  const total = osu + taiko + mania + catchL;

  score += total;

  if(total > 500){
    flash("PERFECT STACK");
    combo++;
    hp=Math.min(100,hp+2);
  } else if(total > 250){
    flash("GOOD STACK");
    combo++;
    hp=Math.min(100,hp+1);
  } else {
    flash("WEAK HIT");
    combo=0;
    hp-=4;
  }

  update();

  if(hp<=0){
    document.body.innerHTML=
      "<div style='padding:40px;font-size:40px'>MEGAMIX COLLAPSED<br>score:"+score+"</div>";
  }
}

// ================= LOOP =================
function loop(){
  if(Math.random()<0.04) spawn();

  notes.forEach(n=>{
    if(n.hit) return;

    n.y+=3.7;
    n.el.style.top=n.y+"px";

    if(n.y>window.innerHeight+50){
      n.hit=true;
      n.el.remove();
      combo=0;
      hp-=5;
      update();
    }
  });

  requestAnimationFrame(loop);
}

// ================= INPUT =================
window.addEventListener("keydown",e=>{
  if(e.key==="d") hit(0);
  if(e.key==="f") hit(1);
  if(e.key==="j") hit(2);
  if(e.key==="k") hit(3);
});

loop();
</script>

</body>
</html>
