<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>imagination* rhythm engine</title>
  <style>
    html,body{margin:0;overflow:hidden;background:#000;color:#fff;font-family:sans-serif}
    canvas{display:block}
  </style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const ctx = c.getContext("2d");
c.width = innerWidth;
c.height = innerHeight;

/* =========================
   GLOBAL STATE (ALL MODES)
========================= */

let mode = "osu";

let coin = 0;
let ballcoin = 0;
let combo = 0;

let mixIntensity = 0;
let win = false;

const ball = {
  x: innerWidth/2,
  y: innerHeight/2,
  vx: 0,
  vy: 0,
  active: false
};

/* =========================
   BALL PHYSICS
========================= */

function updateBall(){

  if(!ball.active) return;

  ball.x += ball.vx;
  ball.y += ball.vy;

  ball.vx *= 0.98;
  ball.vy *= 0.98;

  if(ball.x < 0 || ball.x > innerWidth) ball.vx *= -1;
  if(ball.y < 0 || ball.y > innerHeight) ball.vy *= -1;
}

/* =========================
   MIX SYSTEM
========================= */

function updateMix(){

  mixIntensity += ballcoin * 0.002;
  mixIntensity *= 0.99;

  coin *= 0.995;

  if(coin > 500) win = true;
}

/* =========================
   WIN SKIN
========================= */

function renderWin(){

  ctx.fillStyle = "rgba(0,255,150,0.08)";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle = "#fff";
  ctx.font = "40px sans-serif";
  ctx.fillText("WIN STATE", 20, 80);
}

/* =========================
   SHARED INPUT
========================= */

addEventListener("keydown", e=>{
  if(e.key === " ") push();
});

/* =========================
   PUSH (BALLCOIN → COIN)
========================= */

function push(){
  if(ballcoin <= 0) return;
  coin += ballcoin;
  ballcoin = 0;
}

/* =========================
   DRAW BALL
========================= */

function drawBall(){

  if(!ball.active) return;

  ctx.beginPath();
  ctx.arc(ball.x,ball.y,18,0,Math.PI*2);

  if(ballcoin > 3){
    ctx.fillStyle = "#ffcc00"; // mario skin
  } else {
    ctx.fillStyle = "yellow";
  }

  ctx.fill();
}

/* =========================
   SIMPLE MODE EXAMPLE (OSU CORE)
========================= */

const circles = [];

function spawn(){
  circles.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    r:40,
    ar:200,
    hit:false
  });
}
setInterval(spawn,600);

function updateOsu(){

  for(const c0 of circles){

    c0.ar -= 2.6;

    if(c0.ar < c0.r && !c0.hit){

      c0.hit = true;

      combo = 0;

      ball.active = true;
      ballcoin += 1;
      coin -= 1;

      ball.x = c0.x;
      ball.y = c0.y;
      ball.vx = (Math.random()-0.5)*10;
      ball.vy = (Math.random()-0.5)*10;

    }
  }

  if(coin > 0){
    circles.forEach(c0 => c0.ar -= 0.01 * coin);
  }

  if(coin > 500) win = true;
}

function renderOsu(){

  for(const c0 of circles){

    if(c0.hit) continue;

    ctx.beginPath();
    ctx.arc(c0.x,c0.y,c0.ar,0,Math.PI*2);
    ctx.strokeStyle="white";
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(c0.x,c0.y,c0.r,0,Math.PI*2);
    ctx.stroke();
  }

}

/* =========================
   LOOP
========================= */

function loop(){

  ctx.clearRect(0,0,c.width,c.height);

  updateBall();
  updateMix();

  if(win){
    renderWin();
  }

  updateOsu();
  renderOsu();

  drawBall();

  ctx.fillStyle="#fff";
  ctx.fillText("coin: "+Math.floor(coin),20,20);
  ctx.fillText("ballcoin: "+ballcoin,20,40);
  ctx.fillText("mix: "+mixIntensity.toFixed(2),20,60);

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
