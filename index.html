<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>osu!mix 1D Tease</title>
<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }
  h1 { font-size: 3em; cursor: pointer; }
  .mode-btn {
    margin: 10px;
    padding: 15px 30px;
    font-size: 1.2em;
    background: #2a2;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    color: #fff;
    transition: 0.2s all;
  }
  .mode-btn:hover { background: #3c3; transform: scale(1.05); }
  canvas { background: #000; display: block; margin-top: 20px; border: 2px solid #0f0; }
</style>
</head>
<body>

<h1 id="logo">osu!mix</h1>

<div id="menu">
  <button class="mode-btn" onclick="startMode('osu')">osu!</button>
  <button class="mode-btn" onclick="startMode('taiko')">Taiko</button>
  <button class="mode-btn" onclick="startMode('catch')">Catch</button>
  <button class="mode-btn" onclick="startMode('mania')">Mania</button>
  <button class="mode-btn" onclick="startMode('mix')">Megamix</button>
</div>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let currentMode = null;
let notes = [];
let lastTime = 0;
let health = 100;

// Simple note object
class Note {
  constructor(x, y, speed, key) {
    this.x = x;
    this.y = y;
    this.speed = speed;
    this.key = key;
  }
  update(dt) { this.y += this.speed * dt; }
  draw(ctx) {
    ctx.fillStyle = '#0f0';
    ctx.beginPath();
    ctx.arc(this.x, this.y, 10, 0, Math.PI*2);
    ctx.fill();
  }
}

// Mode configurations
const modeConfigs = {
  osu: { lanes: 4, speed: 200 },
  taiko: { lanes: 1, speed: 300 },
  catch: { lanes: 2, speed: 250 },
  mania: { lanes: 4, speed: 220 },
  mix: { lanes: 5, speed: 240 }
};

function startMode(mode) {
  currentMode = mode;
  notes = [];
  health = 100;
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

// Spawn notes for demo
function spawnNote() {
  const cfg = modeConfigs[currentMode];
  const laneWidth = canvas.width / cfg.lanes;
  const x = Math.random() * laneWidth + Math.floor(Math.random() * cfg.lanes) * laneWidth + laneWidth/2;
  notes.push(new Note(x, -20, cfg.speed, ''));
}

function gameLoop(timestamp) {
  const dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // spawn new note occasionally
  if (Math.random() < 0.02) spawnNote();

  // update & draw notes
  notes.forEach(note => note.update(dt));
  notes.forEach(note => note.draw(ctx));

  // health bar
  ctx.fillStyle = '#f00';
  ctx.fillRect(10, 10, health * 5, 20);
  ctx.strokeStyle = '#fff';
  ctx.strokeRect(10, 10, 500, 20);

  requestAnimationFrame(gameLoop);
}

// Logo click -> burst to mix
document.getElementById('logo').addEventListener('click', () => startMode('mix'));
</script>

</body>
</html>
