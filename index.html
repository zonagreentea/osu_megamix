<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>osu!megamix prototype</title>
<style>
  body { margin:0; background:black; overflow:hidden; font-family:sans-serif; }
  canvas { display:block; }
  #ui {
    position:fixed;
    top:10px;
    left:10px;
    color:white;
    font-size:14px;
    opacity:0.8;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">mode: osu</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

// ---------- GLOBAL CLOCK ----------
let start = Date.now();
function time(){
  return (Date.now() - start) / 1000;
}

// ---------- MODE SYSTEM ----------
const modes = ["osu","taiko","catch","mania"];
let modeIndex = 0;

setInterval(()=>{
  modeIndex = (modeIndex + 1) % modes.length;
}, 10000); // switch every 10s

function mode(){
  return modes[modeIndex];
}

// ---------- INPUT ----------
let keys = {};
window.onkeydown = e => keys[e.key] = true;
window.onkeyup = e => keys[e.key] = false;
let mouse = {x:0,y:0,down:false};
window.onmousemove = e => { mouse.x=e.clientX; mouse.y=e.clientY; };
window.onmousedown = ()=> mouse.down=true;
window.onmouseup = ()=> mouse.down=false;

// ---------- OBJECTS ----------
let objects = [];

function spawn(){
  let m = mode();
  if(m==="osu"){
    objects.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:30,
      t:time()
    });
  }
  if(m==="taiko"){
    objects.push({
      x:canvas.width,
      y:canvas.height/2,
      type: Math.random()>0.5?"red":"blue"
    });
  }
  if(m==="catch"){
    objects.push({
      x:Math.random()*canvas.width,
      y:-20,
      vy:4
    });
  }
  if(m==="mania"){
    objects.push({
      lane: Math.floor(Math.random()*4),
      y:-20,
      vy:5
    });
  }
}

setInterval(spawn, 600);

// ---------- PLAYER ----------
let catcher = {x:canvas.width/2};
let score = 0;

// ---------- GAME LOOP ----------
function loop(){
  requestAnimationFrame(loop);
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let m = mode();
  ui.innerText = "mode: " + m + " | score: " + score;

  // ---- OSU ----
  if(m==="osu"){
    objects.forEach((o,i)=>{
      ctx.beginPath();
      ctx.strokeStyle="pink";
      ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
      ctx.stroke();

      if(mouse.down){
        let dx = mouse.x - o.x;
        let dy = mouse.y - o.y;
        if(Math.sqrt(dx*dx+dy*dy)<o.r){
          objects.splice(i,1);
          score++;
        }
      }
    });
  }

  // ---- TAIKO ----
  if(m==="taiko"){
    ctx.fillStyle="white";
    ctx.fillRect(100, canvas.height/2-50, 20,100);

    objects.forEach((o,i)=>{
      o.x -= 6;
      ctx.fillStyle = o.type==="red"?"red":"blue";
      ctx.beginPath();
      ctx.arc(o.x,o.y,20,0,Math.PI*2);
      ctx.fill();

      if(o.x < 120){
        if((o.type==="red" && keys["z"]) || (o.type==="blue" && keys["x"])){
          score++;
        }
        objects.splice(i,1);
      }
    });
  }

  // ---- CATCH ----
  if(m==="catch"){
    catcher.x = mouse.x;
    ctx.fillStyle="yellow";
    ctx.fillRect(catcher.x-40, canvas.height-20, 80,10);

    objects.forEach((o,i)=>{
      o.y += o.vy;
      ctx.fillStyle="lime";
      ctx.beginPath();
      ctx.arc(o.x,o.y,10,0,Math.PI*2);
      ctx.fill();

      if(o.y > canvas.height-20){
        if(Math.abs(o.x - catcher.x)<50){
          score++;
        }
        objects.splice(i,1);
      }
    });
  }

  // ---- MANIA ----
  if(m==="mania"){
    let lanes = 4;
    let w = canvas.width / lanes;

    for(let i=0;i<lanes;i++){
      ctx.strokeStyle="white";
      ctx.strokeRect(i*w,0,w,canvas.height);
    }

    objects.forEach((o,i)=>{
      o.y += o.vy;
      let x = o.lane * w + w/2;

      ctx.fillStyle="cyan";
      ctx.fillRect(x-20,o.y,40,20);

      if(o.y > canvas.height-100){
        let key = ["z","x",",","."][o.lane];
        if(keys[key]){
          score++;
          objects.splice(i,1);
        }
      }

      if(o.y > canvas.height){
        objects.splice(i,1);
      }
    });
  }

  // cleanup overflow
  if(objects.length > 200){
    objects.splice(0,50);
  }
}

loop();
</script>
</body>
</html>
