<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>MEGAMIX CORE // MODE SHIFT</title>
<style>
body{margin:0;background:#05050a;color:#fff;font-family:monospace;overflow:hidden}
.note{position:absolute;font-size:28px;transform:translateX(-50%)}
#hud{position:fixed;top:10px;left:10px}
#hitbar{position:fixed;bottom:120px;width:100%;height:4px;background:#333}
.perfect{color:#00ff99}.good{color:#ffd400}.bad{color:#ff3355}
.mode{opacity:0.7}
</style>
</head>
<body>

<div id="hud">
score: <span id="score">0</span> |
combo: <span id="combo">0</span> |
hp: <span id="hp">100</span> |
mode: <span id="mode">OSU</span>
<div id="msg"></div>
</div>

<div id="hitbar"></div>

<script>
// ===== CORE =====
const lanes=4;
const laneW=window.innerWidth/lanes;
const hitY=window.innerHeight-120;

let score=0, combo=0, hp=100;

const notes=[];
const emojis=["🟣","🔴","🟡","🟢"];

// ===== MODE SYSTEM =====
const modes=["OSU","TAIKO","MANIA","CATCH"];
let modeIndex=0;
let modeTime=0;

function switchMode(){
  modeIndex=(modeIndex+1)%modes.length;
  document.getElementById("mode").textContent=modes[modeIndex];

  // small “reality shift” penalty/reward
  hp=Math.min(100,hp+10);
  flash("MODE: "+modes[modeIndex]);
}

setInterval(switchMode, 25000);

// ===== SPAWN =====
function spawn(){
  const lane=Math.random()*4|0;

  const el=document.createElement("div");
  el.className="note";
  el.textContent=emojis[lane];

  el.style.left=(lane*laneW+laneW/2)+"px";
  el.style.top="-40px";

  document.body.appendChild(el);

  notes.push({el,lane,y:-40,hit:false});
}

// ===== JUDGE =====
function judge(d){
  if(d<10) return "perfect";
  if(d<25) return "good";
  return "bad";
}

function flash(t){
  const m=document.getElementById("msg");
  m.className=t;
  m.textContent=t;
  setTimeout(()=>m.textContent="",120);
}

function update(){
  document.getElementById("score").textContent=score;
  document.getElementById("combo").textContent=combo;
  document.getElementById("hp").textContent=hp;
}

// ===== MODE BEHAVIOR LAYER =====
function applyMode(hitDist){
  const m=modes[modeIndex];

  if(m==="OSU"){
    return hitDist;
  }

  if(m==="TAIKO"){
    return hitDist + (Math.random()*10); // timing jitter
  }

  if(m==="MANIA"){
    return hitDist - 5; // tighter windows
  }

  if(m==="CATCH"){
    return hitDist + 15; // leniency but slower recovery
  }

  return hitDist;
}

// ===== HIT =====
function hit(lane){
  let best=null,bd=999;

  notes.forEach(n=>{
    if(n.hit||n.lane!==lane) return;
    const d=Math.abs(n.y-hitY);
    if(d<bd){bd=d;best=n;}
  });

  if(!best || bd>60){
    combo=0;
    hp-=8;
    flash("bad");
  }else{
    best.hit=true;
    best.el.remove();

    const adjusted=applyMode(bd);
    const r=judge(adjusted);

    if(r==="perfect"){
      score+=300;combo++;hp=Math.min(100,hp+2);
    }else{
      score+=120;combo++;hp=Math.min(100,hp+1);
    }

    flash(r);
  }

  update();

  if(hp<=0){
    document.body.innerHTML=
      "<div style='padding:40px;font-size:40px'>MEGAMIX BROKEN<br>score:"+score+"</div>";
  }
}

// ===== LOOP =====
function loop(){
  if(Math.random()<0.03) spawn();

  notes.forEach(n=>{
    if(n.hit) return;

    n.y+=3.6;
    n.el.style.top=n.y+"px";

    if(n.y>window.innerHeight+50){
      n.hit=true;
      n.el.remove();
      combo=0;
      hp-=5;
      update();
    }
  });

  requestAnimationFrame(loop);
}

// ===== INPUT =====
window.addEventListener("keydown",e=>{
  if(e.key==="d") hit(0);
  if(e.key==="f") hit(1);
  if(e.key==="j") hit(2);
  if(e.key==="k") hit(3);
});

loop();
</script>

</body>
</html>
