<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="color-scheme" content="dark light"/>
<title>osu!megamix — FULL MIX & MEGAMIX</title>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:sans-serif}
  canvas{display:block;margin:0 auto;background:#111;image-rendering:pixelated;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="mixCanvas" width="256" height="192"></canvas>
<script>
const canvas=document.getElementById('mixCanvas'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;

// mode color map
const modes=['osu','taiko','catch','mania'];
const colors={'osu':'#ff0000','taiko':'#0000ff','catch':'#00ff00','mania':'#ffff00'};

// infinite sequence generator
function* infiniteMix(){
  while(true){
    for(let m of modes) yield m;
  }
}

// gameplay state
let seq=infiniteMix(),frames=0;

// simple drawing functions
function drawCircle(x,y,color){ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y,5,0,2*Math.PI);ctx.fill();}
function drawTaiko(x,y,color){ctx.fillStyle=color;ctx.fillRect(x-4,y-4,8,8);}
function drawCatch(x,y,color){ctx.fillStyle=color;ctx.fillRect(x-3,y-3,6,6);}
function drawMania(x,y,color){ctx.fillStyle=color;ctx.fillRect(x-2,y-2,4,4);}

// main loop
function loop(){
  ctx.clearRect(0,0,W,H);
  let mode=seq.next().value;

  // simple pattern positions
  let x=(frames*2)%W;
  let y=H/2;

  switch(mode){
    case 'osu': drawCircle(x,y,colors[mode]); break;
    case 'taiko': drawTaiko(W-x,y,colors[mode]); break; // right→left
    case 'catch': drawCatch(x,y,colors[mode]); break;
    case 'mania': drawMania(x,y,colors[mode]); break;
  }

  frames++;
  requestAnimationFrame(loop);
}

// burst-to-mix / burst-to-megamix triggers
document.addEventListener('keydown',e=>{
  if(e.key==='m'){frames=0;} // burst-to-mix
  if(e.key==='b'){frames=0;} // burst-to-megamix
});

loop();
</script>
</body>
</html>
