<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>MEGAMIX CORE // INFINITE</title>
<style>
body{margin:0;background:#05050a;color:#fff;font-family:monospace;overflow:hidden}
.note{position:absolute;font-size:28px;transform:translateX(-50%)}
#hud{position:fixed;top:10px;left:10px}
#hitbar{position:fixed;bottom:120px;width:100%;height:4px;background:#333}
.perfect{color:#00ff99}.good{color:#ffd400}.bad{color:#ff3355}
</style>
</head>
<body>

<div id="hud">
score: <span id="score">0</span> |
combo: <span id="combo">0</span> |
hp: <span id="hp">100</span> |
heat: <span id="heat">0</span>%
<div id="msg"></div>
</div>

<div id="hitbar"></div>

<script>
// ===== CORE =====
const lanes=4;
const laneW=window.innerWidth/lanes;
const hitY=window.innerHeight-120;

let score=0, combo=0, hp=100, heat=0;

const notes=[];
const emojis=["🟣","🔴","🟡","🟢"];

// ===== INFINITE GENERATOR STATE =====
let time=0;
let nextSpawn=0;
let lastLane=-1;

// heat = difficulty curve driver
function updateHeat(){
  heat=Math.min(100, heat + 0.01 + combo*0.002);
}

// ===== PATTERN GENERATOR =====
function generateLane(){
  let l=Math.random()*4|0;

  // avoid repetition spam unless heat is high
  if(heat<60){
    while(l===lastLane){
      l=Math.random()*4|0;
    }
  }

  lastLane=l;
  return l;
}

function spawn(){
  const lane=generateLane();

  const el=document.createElement("div");
  el.className="note";
  el.textContent=emojis[lane];

  el.style.left=(lane*laneW+laneW/2)+"px";
  el.style.top="-40px";

  document.body.appendChild(el);

  notes.push({el,lane,y:-40,hit:false});
}

// ===== JUDGE =====
function judge(d){
  if(d<10) return "perfect";
  if(d<25) return "good";
  return "bad";
}

function flash(t){
  const m=document.getElementById("msg");
  m.className=t;
  m.textContent=t.toUpperCase();
  setTimeout(()=>m.textContent="",100);
}

function update(){
  document.getElementById("score").textContent=score;
  document.getElementById("combo").textContent=combo;
  document.getElementById("hp").textContent=hp;
  document.getElementById("heat").textContent=Math.floor(heat);
}

// ===== HIT SYSTEM =====
function hit(lane){
  let best=null,bd=999;

  notes.forEach(n=>{
    if(n.hit||n.lane!==lane) return;
    const d=Math.abs(n.y-hitY);
    if(d<bd){bd=d;best=n;}
  });

  if(!best || bd>60){
    combo=0;
    hp-=8;
    heat+=5;
    flash("bad");
  }else{
    best.hit=true;
    best.el.remove();

    const r=judge(bd);

    if(r==="perfect"){
      score+=300;combo++;hp=Math.min(100,hp+2);
    }else{
      score+=120;combo++;hp=Math.min(100,hp+1);
    }

    flash(r);
  }

  update();

  if(hp<=0){
    document.body.innerHTML=
    "<div style='padding:40px;font-size:40px'>INFINITE LOOP BROKEN<br>score:"+score+"</div>";
  }
}

// ===== INFINITE LOOP =====
function loop(){
  time+=0.016;

  updateHeat();

  // dynamic spawn rate based on heat
  const spawnRate=Math.max(80, 420 - heat*3);

  if(time*1000 > nextSpawn){
    spawn();
    nextSpawn = time*1000 + spawnRate;
  }

  notes.forEach(n=>{
    if(n.hit) return;

    // speed increases with heat
    n.y += 3.2 + heat*0.02;
    n.el.style.top=n.y+"px";

    if(n.y>window.innerHeight+50){
      n.hit=true;
      n.el.remove();
      combo=0;
      hp-=5;
      update();
    }
  });

  requestAnimationFrame(loop);
}

// ===== INPUT =====
window.addEventListener("keydown",e=>{
  if(e.key==="d") hit(0);
  if(e.key==="f") hit(1);
  if(e.key==="j") hit(2);
  if(e.key==="k") hit(3);
});

loop();
</script>

</body>
</html>
