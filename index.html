<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>MEGAMIX CORE // DESIGN ENGINE</title>
<style>
body{margin:0;background:#05050a;color:#fff;font-family:monospace;overflow:hidden}

/* CORE LAYERS */
.note{position:absolute;font-size:28px;transform:translateX(-50%)}
#hud{position:fixed;top:10px;left:10px;font-size:14px;line-height:1.4}
#hitbar{position:fixed;bottom:120px;width:100%;height:4px;background:#333}

/* FEEDBACK SYSTEM */
.perfect{color:#00ff99}
.good{color:#ffd400}
.bad{color:#ff3355}

/* GAME FEEL STATES */
.state-neutral{filter:none}
.state-intense{filter:contrast(1.2) saturate(1.4)}
.state-broken{filter:grayscale(1) contrast(1.5)}
.state-flow{filter:brightness(1.2) blur(0.3px)}
</style>
</head>
<body>

<div id="hud">
score: <span id="score">0</span><br>
combo: <span id="combo">0</span><br>
hp: <span id="hp">100</span><br>
heat: <span id="heat">0</span><br>
state: <span id="state">FLOW</span><br>
design loop: <span id="loop">feedback</span>
<div id="msg"></div>
</div>

<div id="hitbar"></div>

<script>
// ===============================
// CORE GAME DESIGN PRINCIPLES
// ===============================

// 1. CORE LOOP VARIABLES
let score=0, combo=0, hp=100, heat=0;

// 2. SYSTEM FEEDBACK LOOP (everything feeds everything)
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}

// 3. PLAYER AGENCY (input affects multiple systems)
const lanes=4;
const laneW=window.innerWidth/lanes;
const hitY=window.innerHeight-120;

// 4. EMERGENT SYSTEM STATE
let state="FLOW";

// 5. ALL ACTIVE ENTITIES
const notes=[];

// ===============================
// DESIGN PRINCIPLE: MULTI-LAYER FEEDBACK
// ===============================

const emojis=["🟣","🔴","🟡","🟢"];

// ===============================
// PROCEDURAL GENERATION (VARIETY)
// ===============================

function spawn(){
  const lane=Math.random()*4|0;

  const el=document.createElement("div");
  el.className="note";
  el.textContent=emojis[lane];

  el.style.left=(lane*laneW+laneW/2)+"px";
  el.style.top="-40px";

  document.body.appendChild(el);

  notes.push({
    el,
    lane,
    y:-40,
    hit:false,
    t:performance.now()
  });
}

// ===============================
// GAME DESIGN SYSTEM: FEEDBACK TYPES
// ===============================

function judge(d){
  if(d<10) return "perfect";
  if(d<25) return "good";
  return "bad";
}

function flash(t){
  const m=document.getElementById("msg");
  m.className=t;
  m.textContent=t;
  setTimeout(()=>m.textContent="",100);
}

// ===============================
// DESIGN LOOP: STATE EVOLUTION
// ===============================

function updateState(){
  heat = clamp(heat + combo*0.002 - 0.01, 0, 100);

  if(hp<30) state="BROKEN";
  else if(heat>70) state="INTENSE";
  else if(combo>20) state="FLOW";
  else state="NEUTRAL";

  document.body.className="state-"+state.toLowerCase();
  document.getElementById("state").textContent=state;
}

// ===============================
// CORE FEEDBACK LOOP (THE ACTUAL GAME DESIGN)
// ===============================

function hit(lane){
  let best=null,bd=999;

  notes.forEach(n=>{
    if(n.hit||n.lane!==lane) return;
    const d=Math.abs(n.y-hitY);
    if(d<bd){bd=d;best=n;}
  });

  // FAILURE IS ALSO DESIGN INPUT
  if(!best){
    combo=0;
    hp-=6;
    heat+=3;
    flash("miss");
  }else{
    best.hit=true;
    best.el.remove();

    const r=judge(bd);

    if(r==="perfect"){
      score+=300;
      combo++;
      hp=clamp(hp+2,0,100);
      heat+=1;
    }else if(r==="good"){
      score+=120;
      combo++;
      hp=clamp(hp+1,0,100);
      heat+=0.5;
    }else{
      combo=0;
      hp-=4;
      heat+=2;
    }

    flash(r);
  }

  updateHUD();
}

// ===============================
// UPDATE UI (PLAYER READABILITY)
// ===============================

function updateHUD(){
  document.getElementById("score").textContent=score;
  document.getElementById("combo").textContent=combo;
  document.getElementById("hp").textContent=hp;
  document.getElementById("heat").textContent=Math.floor(heat);
}

// ===============================
// GAME LOOP (EMERGENCE ENGINE)
// ===============================

function loop(){
  if(Math.random()<0.04) spawn();

  notes.forEach(n=>{
    if(n.hit) return;

    // DIFFICULTY SCALING = SYSTEM RESPONSE
    const speed = 3.5 + heat*0.02;

    n.y+=speed;
    n.el.style.top=n.y+"px";

    if(n.y>window.innerHeight+50){
      n.hit=true;
      n.el.remove();
      combo=0;
      hp-=5;
    }
  });

  updateState();
  updateHUD();

  requestAnimationFrame(loop);
}

// ===============================
// INPUT (SIMPLE, EXPRESSIVE)
// ===============================

window.addEventListener("keydown",e=>{
  if(e.key==="d") hit(0);
  if(e.key==="f") hit(1);
  if(e.key==="j") hit(2);
  if(e.key==="k") hit(3);
});

// START
loop();
</script>

</body>
</html>
