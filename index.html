<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>osu!megamix 1f</title>

<style>
html,body{
  margin:0;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:monospace;
}

canvas{
  width:100vw;
  height:100vh;
  display:block;
  background:#000;
}

#hud{
  position:fixed;
  inset:0;
  pointer-events:none;
}

.panel{
  position:absolute;
  background:rgba(0,0,0,.45);
  border:1px solid rgba(255,255,255,.08);
  padding:10px 14px;
  backdrop-filter:blur(8px);
}

#top{top:12px;left:12px;}
#bottom{bottom:12px;left:12px;}
#right{top:12px;right:12px;text-align:right;}

.big{
  font-size:22px;
  letter-spacing:2px;
}

.warn{
  animation:pulse .15s infinite alternate;
}

@keyframes pulse{
  from{transform:translateX(-1px);}
  to{transform:translateX(1px);}
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <div class="panel" id="top">
    <div class="big">osu!megamix 1f</div>
    <div id="score">score: 0</div>
    <div id="combo">combo: 0</div>
    <div id="density">density: 1.00</div>
    <div id="phase">phase: stable</div>
  </div>

  <div class="panel" id="bottom">
    z x c v = mania<br>
    mouse = osu!<br>
    j k = taiko<br>
    ← → = catch
  </div>

  <div class="panel" id="right">
    <div id="hp">hp: 100</div>
    <div id="status">status: alive</div>
  </div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
addEventListener("resize",resize);
resize();

const audio = new Audio();
audio.loop = true;

const mix = {
  start:performance.now(),
  score:0,
  combo:0,
  density:1,
  hp:100,
  busted:false,
  shake:0,
  chroma:0,
  notes:[],
  pool:[]
};

const keys = {};
const mouse = {x:0,y:0,down:false};

addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()] = true;
});

addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()] = false;
});

addEventListener("mousemove",e=>{
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

addEventListener("mousedown",()=>mouse.down=true);
addEventListener("mouseup",()=>mouse.down=false);

const catcher = {
  x:innerWidth/2
};

function getTime(){
  return performance.now() - mix.start;
}

function alloc(){
  return mix.pool.pop() || {};
}

function free(note){
  mix.pool.push(note);
}

const chart = [];

function buildChart(){

  let t = 1000;

  for(let i=0;i<2000;i++){

    const mode = i % 4;

    if(mode===0){
      chart.push({
        t,
        ruleset:"mania",
        lane:Math.floor(Math.random()*4)
      });
    }

    if(mode===1){
      chart.push({
        t,
        ruleset:"osu",
        x:Math.random(),
        y:Math.random()
      });
    }

    if(mode===2){
      chart.push({
        t,
        ruleset:"taiko",
        side:Math.random()>.5?"red":"blue"
      });
    }

    if(mode===3){
      chart.push({
        t,
        ruleset:"catch",
        x:Math.random()
      });
    }

    t += 220 - Math.min(i*0.02,120);
  }
}

buildChart();

let chartIndex = 0;

function schedule(){

  const now = getTime();
  const windowAhead = 2200;

  while(chartIndex < chart.length &&
        chart[chartIndex].t < now + windowAhead){

    const src = chart[chartIndex++];
    const n = alloc();

    Object.assign(n,src);

    n.hit = false;

    if(n.ruleset==="osu"){
      n.px = n.x * canvas.width;
      n.py = n.y * canvas.height;
    }

    if(n.ruleset==="catch"){
      n.px = n.x * canvas.width;
      n.py = -20;
      n.vy = 5;
    }

    mix.notes.push(n);
  }
}

function score(v){

  mix.score += v;
  mix.combo++;
  mix.hp = Math.min(100,mix.hp+1.5);

  mix.shake += 1;

  if(mix.combo % 50 === 0){
    mix.shake += 12;
    mix.chroma = .7;
  }
}

function miss(){

  mix.combo = 0;
  mix.hp -= 10;
  mix.shake += 8;

  if(mix.hp <= 0){
    mix.busted = true;
    mix.hp = 40;
  }
}

function director(){

  const t = getTime()/1000;

  mix.density =
    1 +
    Math.sin(t*.08)*.5 +
    Math.sin(t*.31)*.25 +
    t*.003;

  if(mix.busted){
    mix.density *= .6;
  }
}

function renderOsu(n){

  const dt = n.t - getTime();
  const r = Math.max(10,60 - dt/30);

  ctx.beginPath();
  ctx.arc(n.px,n.py,r,0,Math.PI*2);
  ctx.strokeStyle="#fff";
  ctx.lineWidth=4;
  ctx.stroke();

  if(mouse.down &&
     Math.hypot(mouse.x-n.px,mouse.y-n.py)<60 &&
     Math.abs(dt)<160){

    n.hit = true;
    score(300);
  }

  if(dt < -180 && !n.hit){
    n.hit = true;
    miss();
  }
}

function renderMania(n){

  const lanes = 4;
  const laneW = canvas.width/lanes;

  const y =
    (n.t - getTime())*.7;

  ctx.fillStyle="#fff";

  ctx.fillRect(
    n.lane*laneW+8,
    y,
    laneW-16,
    20
  );

  const binds = ["z","x","c","v"];

  if(keys[binds[n.lane]] &&
     Math.abs(y-(canvas.height-140))<28){

    n.hit = true;
    score(300);
  }

  if(y > canvas.height && !n.hit){
    n.hit = true;
    miss();
  }
}

function renderTaiko(n){

  const x =
    canvas.width -
    ((n.t-getTime())*.9);

  const y = canvas.height*.5;

  ctx.beginPath();
  ctx.arc(x,y,42,0,Math.PI*2);

  ctx.strokeStyle =
    n.side==="red"
    ? "#f55"
    : "#5af";

  ctx.lineWidth=8;
  ctx.stroke();

  const hit =
    (n.side==="red" && keys["j"]) ||
    (n.side==="blue" && keys["k"]);

  if(hit && Math.abs(x-200)<50){
    n.hit = true;
    score(300);
  }

  if(x < -80 && !n.hit){
    n.hit = true;
    miss();
  }
}

function renderCatch(n){

  n.py += n.vy;

  ctx.beginPath();
  ctx.arc(n.px,n.py,15,0,Math.PI*2);
  ctx.fillStyle="#8f8";
  ctx.fill();

  if(Math.abs(n.px-catcher.x)<90 &&
     n.py > canvas.height-120){

    n.hit = true;
    score(300);
  }

  if(n.py > canvas.height && !n.hit){
    n.hit = true;
    miss();
  }
}

function phase(){

  if(mix.density < 2) return "stable";
  if(mix.density < 4) return "doubling";
  if(mix.density < 7) return "collapse";
  return "1f overdrive";
}

function loop(){

  requestAnimationFrame(loop);

  schedule();
  director();

  mix.shake *= .9;
  mix.chroma *= .92;

  const sx = (Math.random()-.5)*mix.shake;
  const sy = (Math.random()-.5)*mix.shake;

  ctx.setTransform(1,0,0,1,sx,sy);

  ctx.fillStyle =
    mix.busted
    ? "rgba(30,0,0,.28)"
    : "rgba(0,0,0,.22)";

  ctx.fillRect(
    -100,
    -100,
    canvas.width+200,
    canvas.height+200
  );

  if(keys["arrowleft"]) catcher.x -= 12;
  if(keys["arrowright"]) catcher.x += 12;

  catcher.x = Math.max(
    0,
    Math.min(canvas.width,catcher.x)
  );

  ctx.fillStyle="#ff0";

  ctx.fillRect(
    catcher.x-90,
    canvas.height-70,
    180,
    18
  );

  for(const n of mix.notes){

    if(n.hit) continue;

    switch(n.ruleset){

      case "osu":
        renderOsu(n);
        break;

      case "mania":
        renderMania(n);
        break;

      case "taiko":
        renderTaiko(n);
        break;

      case "catch":
        renderCatch(n);
        break;
    }
  }

  mix.notes = mix.notes.filter(n=>{

    if(n.hit){
      free(n);
      return false;
    }

    return true;
  });

  if(mix.busted){

    mix.hp += .08;

    if(mix.hp > 65){
      mix.busted = false;
    }

  }else{

    mix.hp -= .008 * mix.density;
  }

  document.getElementById("score").textContent =
    "score: " + mix.score;

  document.getElementById("combo").textContent =
    "combo: " + mix.combo;

  document.getElementById("density").textContent =
    "density: " + mix.density.toFixed(2);

  document.getElementById("phase").textContent =
    "phase: " + phase();

  document.getElementById("hp").textContent =
    "hp: " + mix.hp.toFixed(0);

  document.getElementById("status").textContent =
    "status: " +
    (mix.busted
      ? "bust-to-mix"
      : "alive");

  document.body.style.filter =
    "contrast(" +
    (1 + mix.chroma*.2) +
    ")";

  document.getElementById("top").className =
    mix.busted
    ? "panel warn"
    : "panel";
}

loop();
</script>
</body>
</html>
