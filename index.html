<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>MEGAMIX CORE // 1e gromp</title>
<style>
body{margin:0;background:#05050a;color:#fff;font-family:monospace;overflow:hidden}
.screen{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column}
button{background:#111;color:#fff;border:1px solid #333;padding:10px 20px;font-size:18px;cursor:pointer}
button:hover{border-color:#888}
.note{position:absolute;font-size:28px;transform:translateX(-50%)}
#hud{position:fixed;top:10px;left:10px}
.perfect{color:#00ff99}.good{color:#ffd400}.bad{color:#ff3355}
#hitbar{position:fixed;bottom:120px;width:100%;height:4px;background:#333}
</style>
</head>
<body>

<!-- ===== MENU ===== -->
<div id="menu" class="screen">
  <div style="font-size:40px;margin-bottom:20px">MEGAMIX CORE</div>
  <button onclick="startGame()">START MIX</button>
</div>

<!-- ===== GAME HUD ===== -->
<div id="hud" style="display:none">
score: <span id="score">0</span> |
combo: <span id="combo">0</span> |
hp: <span id="hp">100</span> |
state: <span id="state">MIX</span>
<div id="msg"></div>
</div>

<div id="hitbar" style="display:none"></div>

<script>
// ===== STATE MACHINE =====
let state="menu";

function setState(s){
  state=s;
  document.getElementById("state").textContent=s;
}

// ===== CORE =====
const lanes=4;
const laneW=window.innerWidth/lanes;
const hitY=window.innerHeight-120;

let score=0, combo=0, hp=100;

const notes=[];
const emojis=["🟣","🔴","🟡","🟢"];

// ===== STREAM =====
const stream=[
  {t:0,l:0},{t:0.25,l:1},{t:0.5,l:2},{t:0.75,l:3},
  {t:1.5,l:0},{t:1.7,l:1},{t:1.9,l:2},{t:2.1,l:3},
  {t:3,l:1},{t:3,l:2}
];

let start=0;
let i=0;

// ===== UI =====
function showGameUI(on){
  document.getElementById("hud").style.display=on?"block":"none";
  document.getElementById("hitbar").style.display=on?"block":"none";
  document.getElementById("menu").style.display=on?"none":"flex";
}

// ===== START =====
function startGame(){
  showGameUI(true);
  reset();
  setState("MIX");
  start=performance.now();
  loop();
}

// ===== RESET =====
function reset(){
  score=0;combo=0;hp=100;i=0;
  notes.forEach(n=>n.el.remove());
  notes.length=0;
  update();
}

// ===== BUST TO MIX =====
function bustToMix(){
  setState("BUST");

  document.body.style.background="#220000";

  setTimeout(()=>{
    document.body.style.background="#05050a";
    reset();
    setState("MIX");
    start=performance.now();
    loop();
  },900);
}

// ===== SPAWN =====
function spawn(lane){
  const el=document.createElement("div");
  el.className="note";
  el.textContent=emojis[lane];
  el.style.left=(lane*laneW+laneW/2)+"px";
  el.style.top="-40px";
  document.body.appendChild(el);

  notes.push({el,lane,y:-40,hit:false});
}

// ===== JUDGE =====
function judge(d){
  if(d<10) return "perfect";
  if(d<25) return "good";
  return "bad";
}

function flash(t){
  const m=document.getElementById("msg");
  m.className=t;
  m.textContent=t.toUpperCase();
  setTimeout(()=>m.textContent="",120);
}

// ===== UPDATE =====
function update(){
  document.getElementById("score").textContent=score;
  document.getElementById("combo").textContent=combo;
  document.getElementById("hp").textContent=hp;
}

// ===== HIT =====
function hit(lane){
  let best=null,bd=999;

  notes.forEach(n=>{
    if(n.hit||n.lane!==lane) return;
    const d=Math.abs(n.y-hitY);
    if(d<bd){bd=d;best=n;}
  });

  if(!best || bd>60){
    combo=0;
    hp-=10;
    flash("bad");
  }else{
    best.hit=true;
    best.el.remove();

    const r=judge(bd);

    if(r==="perfect"){
      score+=300;combo++;hp=Math.min(100,hp+2);
    }else{
      score+=120;combo++;hp=Math.min(100,hp+1);
    }

    flash(r);
  }

  update();

  // ===== CRITICAL SYSTEM EVENT =====
  if(hp<=0){
    bustToMix();
  }
}

// ===== LOOP =====
function loop(){
  if(state!=="MIX") return;

  const now=(performance.now()-start)/1000;

  while(i<stream.length && now>stream[i].t){
    spawn(stream[i].l);
    i++;
  }

  notes.forEach(n=>{
    if(n.hit) return;
    n.y+=3.8;
    n.el.style.top=n.y+"px";

    if(n.y>window.innerHeight+50){
      n.hit=true;
      n.el.remove();
      combo=0;
      hp-=5;
      update();

      if(hp<=0){
        bustToMix();
      }
    }
  });

  requestAnimationFrame(loop);
}

// ===== INPUT =====
window.addEventListener("keydown",e=>{
  if(state!=="MIX") return;

  if(e.key==="d") hit(0);
  if(e.key==="f") hit(1);
  if(e.key==="j") hit(2);
  if(e.key==="k") hit(3);
});
</script>

</body>
</html>
