<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>osu!megamix</title>
<style>
html,body{
  margin:0;
  height:100%;
  background:#0f1116;
  color:#e6edf3;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  overflow:hidden;
}
canvas{
  position:fixed;
  inset:0;
}
.overlay{
  position:fixed;
  top:16px;
  left:16px;
  font-size:12px;
  opacity:.6;
  letter-spacing:.5px;
}
</style>
</head>
<body>

<canvas id="game"></canvas>
<div class="overlay" id="overlay">
  1 osu · 2 taiko · 3 catch · 4 mania
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

class Clock{
  constructor(){ this.reset(); }
  reset(){ this.start = performance.now(); }
  now(){ return performance.now() - this.start; }
}
const clock = new Clock();

let mode = "osu";

document.addEventListener("keydown", e=>{
  if(e.key==="1") mode="osu";
  if(e.key==="2") mode="taiko";
  if(e.key==="3") mode="catch";
  if(e.key==="4") mode="mania";
});

function judge(delta){
  delta=Math.abs(delta);
  if(delta<70) return true;
  return false;
}

let objects=[];
function generate(){
  objects=[];
  for(let i=0;i<24;i++){
    objects.push({
      x: 150 + (i%4)*220,
      lane:i%4,
      time:1000+i*500,
      hit:false
    });
  }
}
generate();

let catcher={x:innerWidth/2,y:innerHeight-80};

document.addEventListener("mousedown",e=>{
  if(mode!=="osu") return;
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left;
  const my=e.clientY-rect.top;
  for(let o of objects){
    if(o.hit) continue;
    const dx=mx-o.x;
    const dy=my-canvas.height/2;
    if(Math.sqrt(dx*dx+dy*dy)<40){
      if(judge(clock.now()-o.time)) o.hit=true;
    }
  }
});

document.addEventListener("keydown",e=>{
  if(mode==="mania"){
    const keys=["d","f","j","k"];
    const lane=keys.indexOf(e.key);
    if(lane===-1) return;
    for(let o of objects){
      if(o.hit||o.lane!==lane) continue;
      if(judge(clock.now()-o.time)) o.hit=true;
    }
  }

  if(mode==="taiko"){
    if(!["f","j","d","k"].includes(e.key)) return;
    for(let o of objects){
      if(o.hit) continue;
      if(judge(clock.now()-o.time)) o.hit=true;
    }
  }

  if(mode==="catch"){
    if(e.key==="ArrowLeft") catcher.x-=50;
    if(e.key==="ArrowRight") catcher.x+=50;
  }
});

function loop(){
  const now=clock.now();
  ctx.fillStyle="#0f1116";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let o of objects){
    if(o.hit) continue;

    if(mode==="osu"){
      const y=canvas.height/2;
      const t=o.time-now;
      if(Math.abs(t)>900) continue;
      ctx.strokeStyle="#7aa2ff";
      ctx.beginPath();
      ctx.arc(o.x,y,40,0,Math.PI*2);
      ctx.stroke();
    }

    if(mode==="mania"){
      const hitLine=canvas.height-140;
      const y=hitLine-(o.time-now)*0.5;
      const laneWidth=90;
      const base=canvas.width/2-180;
      ctx.fillStyle="#9ece6a";
      ctx.fillRect(base+o.lane*laneWidth,y,laneWidth,18);
      ctx.strokeStyle="#2a2f3a";
      ctx.strokeRect(base+o.lane*laneWidth,y,laneWidth,18);
    }

    if(mode==="taiko"){
      const centerY=canvas.height/2;
      const x=200-(o.time-now)*0.6;
      ctx.fillStyle="#f7768e";
      ctx.beginPath();
      ctx.arc(x,centerY,35,0,Math.PI*2);
      ctx.fill();
    }

    if(mode==="catch"){
      const y=(now-o.time+1000)*0.4;
      ctx.fillStyle="#e0af68";
      ctx.fillRect(o.x,y,18,18);
      if(Math.abs(o.x-catcher.x)<45 &&
         Math.abs(y-catcher.y)<40){
        o.hit=true;
      }
    }
  }

  if(mode==="catch"){
    ctx.fillStyle="#e6edf3";
    ctx.fillRect(catcher.x-50,catcher.y,100,18);
  }

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
