<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>1e gromp</title>
<style>
body{margin:0;background:#0b0b0f;color:#fff;font-family:monospace;overflow:hidden}
#lane{position:absolute;left:50%;top:0;width:4px;height:100vh;background:#222}
.note{position:absolute;font-size:32px;transition:top 0.02s linear}
#hud{position:fixed;top:10px;left:10px}
</style>
</head>
<body>
<div id="lane"></div>
<div id="hud">gromp: <span id="score">0</span></div>

<script>
let score=0;
const emojis=["🟣","🔴","🟡","🟢"];
const notes=[];

function spawn(){
  const el=document.createElement("div");
  el.className="note";
  el.textContent=emojis[Math.random()*emojis.length|0];
  el.style.left=(window.innerWidth/2-20)+"px";
  el.style.top="-40px";
  document.body.appendChild(el);
  notes.push({el,y:-40,hit:false});
}

function loop(){
  notes.forEach(n=>{
    n.y+=4;
    n.el.style.top=n.y+"px";
    if(n.y>window.innerHeight && !n.hit){
      n.el.remove();
      n.hit=true;
    }
  });
  requestAnimationFrame(loop);
}

setInterval(spawn,350);
loop();

window.addEventListener("keydown",(e)=>{
  const hitZone=window.innerHeight-120;
  notes.forEach(n=>{
    if(!n.hit && Math.abs(n.y-hitZone)<40){
      n.hit=true;
      n.el.style.opacity=0;
      score+=1;
      document.getElementById("score").textContent=score;
    }
  });
});
</script>
</body>
</html>
