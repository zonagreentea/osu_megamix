<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1c Pet — MIX HUB</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    color: #eee;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
    overflow: hidden;
    font-family: monospace;
  }
  canvas {
    background: #222;
    display: block;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Base resolution for scaling
const BASE_WIDTH = 256;
const BASE_HEIGHT = 192;

// Scaling function
function resizeCanvas() {
  const scaleX = window.innerWidth / BASE_WIDTH;
  const scaleY = window.innerHeight / BASE_HEIGHT;
  const scale = Math.min(scaleX, scaleY);
  canvas.width = BASE_WIDTH * scale;
  canvas.height = BASE_HEIGHT * scale;
  ctx.setTransform(scale, 0, 0, scale, 0, 0); // scale drawing context
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// 1c Pet prototype state
let petX = BASE_WIDTH/2;
let petY = BASE_HEIGHT/2;
let petColor = 'cyan';

// Key handling
const keys = {};
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

function update() {
  if(keys['a'] || keys['ArrowLeft']) petX -= 2;
  if(keys['d'] || keys['ArrowRight']) petX += 2;
  if(keys['w'] || keys['ArrowUp']) petY -= 2;
  if(keys['s'] || keys['ArrowDown']) petY += 2;

  // Clamp to canvas
  petX = Math.max(0, Math.min(BASE_WIDTH, petX));
  petY = Math.max(0, Math.min(BASE_HEIGHT, petY));
}

function draw() {
  ctx.fillStyle = '#222';
  ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

  // Draw pet
  ctx.fillStyle = petColor;
  ctx.fillRect(petX-8, petY-8, 16, 16);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
