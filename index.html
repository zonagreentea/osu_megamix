<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>osu!megamix</title>
<style>
body{margin:0;background:black;overflow:hidden;color:white;font-family:sans-serif}
#menu{position:absolute;top:10px;left:10px;z-index:10}
button{margin:2px;padding:6px 10px;background:#111;color:white;border:1px solid #444}
canvas{display:block}
</style>
</head>
<body>
<div id="menu">
<button onclick="switchMode('osu')">osu!</button>
<button onclick="switchMode('taiko')">taiko</button>
<button onclick="switchMode('catch')">catch</button>
<button onclick="switchMode('mania')">mania</button>
</div>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d");
const lowW=256,lowH=192,off=document.createElement("canvas");off.width=lowW;off.height=lowH;
const octx=off.getContext("2d");let replayLog=[];
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
window.onresize=resize;resize();

class Clock{constructor(){this.reset();}reset(){this.start=performance.now();}now(){return performance.now()-this.start;}}
const clock=new Clock();

let currentRuleset=null;
function switchMode(n){clock.reset();currentRuleset=rulesets[n];currentRuleset.init();}

const OD=5,hw300=()=>79-6*OD,hw100=()=>139-8*OD,hw50=()=>199-10*OD;
function judge(d){d=Math.abs(d);return d<=hw300()?300:d<=hw100()?100:d<=hw50()?50:0;}

function logInput(e){replayLog.push({type:e.type,time:clock.now(),key:e.key,x:e.clientX,y:e.clientY});}

document.addEventListener("mousedown",e=>{currentRuleset.input(e,clock.now());logInput(e);});
document.addEventListener("keydown",e=>{currentRuleset.input(e,clock.now());logInput(e);});

function saveMix(){const b=new Blob([JSON.stringify(replayLog)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="replay.mix.json";a.click();}

const osuRuleset={objects:[],AR:800,radius:40,
init(){this.objects=[];for(let i=0;i<20;i++)this.objects.push({x:200+(i%4)*200,y:200+(i%3)*150,time:1000+i*600,hit:!1});},
draw(now,ctx){for(let o of this.objects){if(o.hit)continue;const t=o.time-now,a=o.time-this.AR;if(now<a)continue;if(t<-hw50()){o.hit=!0;continue;}const r=this.radius+2*this.radius*t/this.AR;ctx.strokeStyle="white";ctx.beginPath();ctx.arc(o.x,o.y,Math.max(r,this.radius),0,2*Math.PI);ctx.stroke();ctx.fillStyle="cyan";ctx.beginPath();ctx.arc(o.x,o.y,this.radius,0,2*Math.PI);ctx.fill();}},
input(e,now){if(e.type!="mousedown")return;const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;for(let o of this.objects)if(!o.hit&&Math.hypot(mx-o.x,my-o.y)<=this.radius){if(judge(now-o.time))o.hit=!0;return;}}
};

const maniaRuleset={objects:[],scroll:.6,hitLine:lowH-30,
init(){this.objects=[];for(let i=0;i<20;i++)this.objects.push({lane:i%4,time:1000+i*600,hit:!1});},
draw(now,ctx){const w=lowW/6;for(let i=0;i<4;i++){ctx.strokeStyle="#333";ctx.strokeRect(lowW/2-2*w+i*w,0,w,lowH);}ctx.strokeStyle="white";ctx.beginPath();ctx.moveTo(0,this.hitLine);ctx.lineTo(lowW,this.hitLine);ctx.stroke();for(let o of this.objects)if(!o.hit){const y=this.hitLine-(o.time-now)*this.scroll;if(y>lowH||y<-50)continue;ctx.fillStyle="cyan";ctx.fillRect(lowW/2-2*w+o.lane*w,y,w,5);}},
input(e,now){if(e.type!="keydown")return;const k=["d","f","j","k"].indexOf(e.key);if(k==-1)return;for(let o of this.objects)if(!o.hit&&o.lane==k&&judge(now-o.time))o.hit=!0;}
};

const taikoRuleset={objects:[],scroll:.5,
init(){this.objects=[];for(let i=0;i<20;i++)this.objects.push({type:i%2==0?"don":"ka",time:1000+i*600,hit:!1});},
draw(now,ctx){const y=lowH/2;ctx.beginPath();ctx.arc(20,y,10,0,2*Math.PI);ctx.strokeStyle="white";ctx.stroke();for(let o of this.objects)if(!o.hit){const x=20-(o.time-now)*this.scroll;if(x<-20)continue;ctx.fillStyle=o.type=="don"?"red":"blue";ctx.beginPath();ctx.arc(x,y,7,0,2*Math.PI);ctx.fill();}},
input(e,now){if(e.type!="keydown")return;if(!["f","j","d","k"].includes(e.key))return;for(let o of this.objects)if(!o.hit&&judge(now-o.time))o.hit=!0;}
};

const catchRuleset={objects:[],catcher:{x:lowW/2,y:lowH-10},
init(){this.objects=[];for(let i=0;i<20;i++)this.objects.push({x:20+(i%4)*40,time:1000+i*600,hit:!1});},
draw(now,ctx){for(let o of this.objects)if(!o.hit){const y=(now-o.time+1000)*.4;if(y<0)continue;ctx.fillStyle="yellow";ctx.fillRect(o.x,y,5,5);if(Math.abs(o.x-this.catcher.x)<10&&Math.abs(y-this.catcher.y)<10)o.hit=!0;}ctx.fillStyle="white";ctx.fillRect(this.catcher.x-20,this.catcher.y,40,5);},
input(e){if(e.type!="keydown")return;if(e.key=="ArrowLeft")this.catcher.x-=10;if(e.key=="ArrowRight")this.catcher.x+=10;}
};

const rulesets={osu:osuRuleset,mania:maniaRuleset,taiko:taikoRuleset,catch:catchRuleset};
switchMode("osu");

function loop(){
    octx.fillStyle="black";octx.fillRect(0,0,lowW,lowH);
    currentRuleset.draw(clock.now(),octx);
    ctx.imageSmoothingEnabled=!1;
    ctx.drawImage(off,0,0,canvas.width,canvas.height);
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
