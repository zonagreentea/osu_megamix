# osu!megamix — universal bindings (anything can be cursor, anything can be button)
# Format: <role> = <signal_id>[,<signal_id>...]
# Signal id examples:
#   kbd:W, kbd:SPACE, mouse:left, mouse:dx, mouse:dy, mouse:x, mouse:y, gp:lx, gp:ly, midi:cc74, net:aimx, etc.

# Cursor/Aim priority (recommended): ABS > REL > AXIS
aim_abs_x = mouse:x
aim_abs_y = mouse:y

aim_rel_dx = mouse:dx
aim_rel_dy = mouse:dy

# Virtual axes can be produced by your keyboard mapper (WASD -> kbd:AXIS_X / kbd:AXIS_Y)
aim_axis_x = kbd:AXIS_X
aim_axis_y = kbd:AXIS_Y

# Buttons (any of these can be used to hit)
hit_buttons = kbd:J,kbd:K,mouse:left,mouse:right

# Slow mode is a TOGGLE button; you should edge-detect it, and reset slow_mode=false on any reset
slow_toggle_button = kbd:TAB

# Optional knobs (safe defaults)
axis_deadzone = 0.12
