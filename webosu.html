<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Webosu — Mix + Megamix</title>
<style>
  body{margin:0;background:#111;overflow:hidden;color:#fff;font-family:sans-serif;}
  canvas{display:block;margin:0 auto;background:#222;}
  #ui{position:absolute;top:10px;left:50%;transform:translateX(-50%);text-align:center;}
  button{margin:0 5px;padding:5px 12px;background:#333;border:none;color:#fff;cursor:pointer;}
  button:hover{background:#555;}
</style>
</head>
<body>
<div id="ui">
  <div id="mode-label">🎮 Select mode:</div>
  <div id="buttons"></div>
  <div id="score">Score: 0</div>
</div>
<canvas id="game" width="800" height="600"></canvas>

<script>
const MODES = ["osu","taiko","ctb","mania","mix","newmode1","newmode2"];
let mode = "mix"; // default
let score = 0;
const scoreEl = document.getElementById("score");
const buttonsEl = document.getElementById("buttons");

// create mode buttons
MODES.forEach(m => {
  const btn = document.createElement("button");
  btn.textContent = m;
  btn.onclick = () => { mode = m; console.log("Mode selected:", mode); };
  buttonsEl.appendChild(btn);
});

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let circles = [];
let frame = 0;

// click to hit circles
canvas.addEventListener('click', e => {
  circles.forEach(c => {
    if (!c.hit && Math.hypot(c.x - e.offsetX, c.y - e.offsetY) < c.radius) {
      c.hit = true;
      score += 100;
      scoreEl.textContent = "Score: " + score;
      console.log("🎯 Hit! Mode:", mode, "Score:", score);
    }
  });
});

// spawn new circle
function addCircle() {
  circles.push({ x: Math.random() * 760 + 20, y: 0, radius: 20, hit: false });
}

// main loop
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (frame % 60 === 0) addCircle(); // spawn every 60 frames

  circles.forEach(c => {
    if (!c.hit) {
      c.y += 3;
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.radius, 0, 2 * Math.PI);
      ctx.fillStyle = (mode === "mix" || mode === "megamix") ? "#f00" : "#fff";
      ctx.fill();
    }
  });

  // Megamix autopilot bursts
  if ((mode === "mix" || mode === "megamix") && frame % 180 === 0) {
    circles.forEach(c => { if (!c.hit) { c.hit = true; score += 100; scoreEl.textContent = "Score: " + score; } });
    console.log("🚀 Megamix autopilot burst! Score:", score);
  }

  frame++;
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
